version: 2
updates:
    # pnpm/npm dependencies (Dependabot reads pnpm-lock.yaml).
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      groups:
          dhis2:
              patterns:
                  - '@dhis2/*'
          dev-dependencies:
              dependency-type: development

    # GitHub Actions used in workflows.
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
